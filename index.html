<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>にらさき法律事務所 - 公式ホームページ</title>
    <style>
        /* 簡単なデザイン設定（CSS）もHTML内に含めています */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f4f7f8;
        }
        header {
            background-color: #2c3e50; /* 濃い紺色で信頼感を演出 */
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>にらさき法律事務所</h1>
    </header>

    <div class="container">
        <h2>ようこそ、にらさき法律事務所のホームページへ！！</h2>
        <p>私たちは、地域の皆様に寄り添う身近な法律相談所を目指しています。</p>
        
        <h3>業務内容</h3>
        <ul>
            <li>民事事件全般</li>
            <li>家事事件（相続・離婚など）</li>
            <li>刑事事件</li>
            <li>企業法務</li>
        </ul>

        <h3>事務所紹介</h3>
        <p>山梨県韮崎市にて、皆様のお困りごとを解決するお手伝いをしています。お気軽にご相談ください。</p>
    </div>

    <footer>
        &copy; 2026 にらさき法律事務所
    </footer>

</body>
</html>
